name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build tests
        run: npm run test:build

      - name: Run tests
        run: npm test

      - name: Verify packaged contents
        run: npm pack --dry-run

      - name: Verify CLI help on Windows
        if: runner.os == 'Windows'
        run: .\prioritize-prs.cmd --help

      - name: Verify CLI help on Unix
        if: runner.os != 'Windows'
        run: ./prioritize-prs --help

